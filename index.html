<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>唐詩小狀元 — 課堂搶答系統</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --pink:#FFB5C2;--pink-dark:#E8909E;--blue:#B5D8FF;--blue-dark:#8AB8E8;
  --green:#B5FFC2;--green-dark:#8AE89A;--yellow:#FFF5B5;--yellow-dark:#E8D98A;
  --peach:#FFD8C2;--purple:#D8C2FF;--purple-dark:#B89AE8;
  --bg:#FFF8F0;--text:#5C4033;--text-light:#8B7355;--white:#FFFAF5;
}
body{
  font-family:'Noto Sans TC','Microsoft JhengHei','PingFang TC',sans-serif;
  background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
}

.app-container{
  width:100%;max-width:1120px;aspect-ratio:16/9;max-height:calc(100vh - 40px);
  background:var(--white);border:4px solid var(--text);border-radius:8px;
  box-shadow:4px 4px 0px rgba(92,64,51,0.15),0 0 0 4px var(--white),0 0 0 8px var(--pink-dark);
  padding:28px 32px;display:flex;flex-direction:column;overflow:hidden;
}

.app-header{
  display:flex;align-items:center;justify-content:space-between;
  padding-bottom:14px;border-bottom:3px dashed var(--pink-dark);margin-bottom:16px;flex-shrink:0;
}
.app-header h1{font-size:26px;color:var(--pink-dark);}

.screen{display:none;flex:1;overflow-y:auto;flex-direction:column;}
.screen.active{display:flex;animation:fadeIn .3s;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:15px;font-weight:700;color:var(--text);margin-bottom:6px;}
.pixel-input{
  width:100%;padding:12px 16px;font-family:inherit;font-size:16px;
  border:3px solid var(--pink-dark);background:var(--white);color:var(--text);
  outline:none;border-radius:6px;
}
.pixel-input:focus{border-color:var(--blue-dark);box-shadow:0 0 0 3px rgba(181,216,255,0.4);}

.pixel-btn{
  display:inline-block;font-family:inherit;font-size:15px;font-weight:700;
  padding:12px 28px;border:3px solid;cursor:pointer;
  box-shadow:3px 3px 0px rgba(92,64,51,0.12);border-radius:6px;color:var(--text);
}
.pixel-btn:hover{transform:translateY(-2px);box-shadow:5px 5px 0px rgba(92,64,51,0.18);}
.pixel-btn:active{transform:translateY(1px);box-shadow:1px 1px 0px rgba(92,64,51,0.08);}
.pixel-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;}
.btn-pink{background:var(--pink);border-color:var(--pink-dark);}
.btn-blue{background:var(--blue);border-color:var(--blue-dark);}
.btn-green{background:var(--green);border-color:var(--green-dark);}
.btn-yellow{background:var(--yellow);border-color:var(--yellow-dark);}
.btn-purple{background:var(--purple);border-color:var(--purple-dark);}
.btn-danger{background:#FFE0E0;border-color:#E89090;}
.btn-block{display:block;width:100%;}
.btn-sm{font-size:13px;padding:8px 18px;}
.back-link{font-size:13px;color:var(--text-light);cursor:pointer;text-decoration:underline;background:none;border:none;font-family:inherit;text-align:center;margin-top:10px;}

.dash-center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;max-width:500px;margin:0 auto;}
.session-code{font-size:56px;font-weight:900;letter-spacing:10px;color:var(--pink-dark);padding:12px 24px;border:3px dashed var(--pink-dark);border-radius:10px;background:#FFF0F3;margin:12px 0;}

.quiz-top{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:var(--yellow);border:3px solid var(--yellow-dark);border-radius:6px;font-size:18px;font-weight:700;margin-bottom:10px;flex-shrink:0;}
.quiz-bar{height:14px;background:var(--bg);border:2px solid var(--pink-dark);border-radius:6px;margin-bottom:12px;flex-shrink:0;}
.quiz-bar-fill{height:100%;background:var(--pink);border-radius:4px;transition:width .3s;}
.quiz-q-box{border:4px solid var(--purple-dark);padding:24px;margin-bottom:16px;border-radius:10px;background:#FFFBF5;flex:1.2;display:flex;flex-direction:column;justify-content:center;}
.quiz-q-box .q-poem{font-size:18px;color:var(--purple-dark);margin-bottom:12px;padding-bottom:12px;border-bottom:3px dashed var(--purple);}
.quiz-q-box .q-text{font-size:32px;font-weight:900;color:var(--text);line-height:1.5;text-align:center;}
.quiz-q-box .q-answer{font-size:24px;color:var(--green-dark);margin-top:20px;font-weight:900;text-align:center;padding:10px;border:3px solid var(--green-dark);border-radius:8px;background:#E8FFE8;}

.groups-grid{display:grid;grid-template-columns:repeat(4, 1fr);gap:12px;flex:1;}
.group-card{
  border:4px solid;border-radius:10px;padding:12px;
  display:flex;flex-direction:column;align-items:center;justify-content:space-between;
  background:var(--white);
  transition:transform 0.2s;
}
.group-card.A{border-color:#FF8C94;background:#FFF5F5;}
.group-card.B{border-color:#8AB8E8;background:#F5F9FF;}
.group-card.C{border-color:#8AE89A;background:#F5FFF5;}
.group-card.D{border-color:#FFD98A;background:#FFFDF5;}
.group-letter{
  font-size:32px;font-weight:900;width:100%;text-align:center;
  padding:4px 0;border-radius:6px 6px 0 0;flex-shrink:0;
}
.group-card.A .group-letter{background:#FF8C94;color:#fff;}
.group-card.B .group-letter{background:#8AB8E8;color:#fff;}
.group-card.C .group-letter{background:#8AE89A;color:#fff;}
.group-card.D .group-letter{background:#FFD98A;color:#fff;}
.group-score-box{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.group-score{font-size:48px;font-weight:900;color:var(--text);line-height:1;}
.group-score-label{font-size:12px;color:var(--text-light);margin-top:4px;}
.group-btns{display:flex;flex-direction:column;gap:6px;width:100%;flex-shrink:0;}
.group-btn{
  padding:8px 4px;border:3px solid;border-radius:6px;
  font-family:inherit;font-size:14px;font-weight:900;cursor:pointer;
  width:100%;transition:all .1s;
}
.group-btn:active{transform:scale(.95);}
.group-btn.correct{background:#E8FFE8;border-color:var(--green-dark);color:#2d7a2d;}
.group-btn.correct:hover{background:var(--green);}
.group-btn.wrong{background:#FFE8E8;border-color:#E89090;color:#a33;}
.group-btn.wrong:hover{background:#FFD0D0;}
.group-btn.flash{animation:btnFlash .3s;}
@keyframes btnFlash{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}

.next-q-bar{display:flex;gap:10px;justify-content:center;margin-top:12px;flex-shrink:0;}

.result-layout{display:grid;grid-template-columns:1fr 1fr;gap:20px;flex:1;}
.result-summary{text-align:center;padding:20px;border:3px solid var(--yellow-dark);border-radius:8px;background:linear-gradient(135deg,var(--yellow),#FFF8DC);display:flex;flex-direction:column;align-items:center;justify-content:center;}
.result-summary .trophy{font-size:64px;}
.result-summary .winner{font-size:22px;font-weight:900;margin:6px 0;}
.result-summary .winner-score{font-size:36px;color:var(--pink-dark);font-weight:900;}
.lb-panel{border:3px solid var(--yellow-dark);border-radius:8px;background:#FFFEFA;overflow-y:auto;}
.lb-title{font-size:17px;font-weight:700;text-align:center;padding:10px;background:var(--yellow);border-bottom:3px solid var(--yellow-dark);}
.lb-table{width:100%;border-collapse:collapse;font-size:15px;}
.lb-table th{padding:8px;background:var(--blue);border-bottom:2px solid var(--blue-dark);font-weight:700;font-size:13px;}
.lb-table td{padding:8px;text-align:center;border-bottom:1px dashed var(--text-light);}
.lb-table .r-1{color:#FFD700;font-size:24px;font-weight:900;}
.lb-table .r-2{color:#C0C0C0;font-size:20px;font-weight:900;}
.lb-table .r-3{color:#CD7F32;font-size:18px;font-weight:900;}
.highlight-row{background:#FFF8E1;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{background:#FFF8E1}50%{background:#FFECB3}}

.admin-lb-table{width:100%;border-collapse:collapse;font-size:14px;margin-top:10px;}
.admin-lb-table th{padding:8px;background:var(--purple);border-bottom:2px solid var(--purple-dark);font-size:13px;}
.admin-lb-table td{padding:8px;text-align:center;border-bottom:1px dashed var(--text-light);}

@media(max-width:800px){
  .app-container{aspect-ratio:auto;max-height:none;padding:16px 12px;}
  .groups-grid{grid-template-columns:1fr;}
  .result-layout{grid-template-columns:1fr;}
  .session-code{font-size:36px;letter-spacing:6px;}
  .group-letter{font-size:26px;width:40px;height:40px;}
  .group-score{font-size:24px;}
  .group-btn{padding:8px 10px;font-size:12px;}
}
</style>
</head>
<body>
<div class="app-container" id="app">
  <div class="app-header"><h1>📜 唐詩小狀元 — 課堂搶答</h1><span id="userLabel" style="font-size:14px;color:var(--text-light);"></span></div>

  <!-- ── DASHBOARD ── -->
  <div class="screen active" id="scrDash">
    <div class="dash-center">
      <h2 style="color:var(--purple-dark);margin-bottom:16px;">🎮 開設搶答遊戲</h2>
      <div class="form-group" style="width:100%;">
        <label>選擇年級</label>
        <select class="pixel-input" id="sesGrade" style="cursor:pointer;">
          <option value="P4">📗 四年級</option>
          <option value="P5">📘 五年級</option>
          <option value="P6">📙 六年級</option>
        </select>
      </div>
      <button class="pixel-btn btn-pink btn-block" id="btnCreate" onclick="createSes()">建立課堂遊戲</button>
      <div id="sesInfo" style="display:none;margin-top:16px;text-align:center;">
        <p style="font-size:13px;color:var(--text-light);">課堂代碼</p>
        <div class="session-code" id="sesCodeDisp">------</div>
        <p style="font-size:14px;color:var(--text);margin:6px 0;">年級：<strong id="sesGradeDisp"></strong></p>
        <button class="pixel-btn btn-green btn-block" id="btnStart" onclick="startGame()">▶ 開始遊戲</button>
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-top:10px;justify-content:center;">
      <button class="pixel-btn btn-purple btn-sm" onclick="goScreen('scrAdmin')">📊 管理排行榜</button>
    </div>
  </div>

  <!-- ── QUIZ ── -->
  <div class="screen" id="scrQuiz">
    <div class="quiz-top"><span id="qCounter">第 1 / 10 題</span><span>總分：<strong id="sumScore" style="color:var(--pink-dark);">0</strong></span></div>
    <div class="quiz-bar"><div class="quiz-bar-fill" id="qBar" style="width:0%"></div></div>
    <div class="quiz-q-box">
      <div class="q-poem" id="qPoem"></div>
      <div class="q-text" id="qText"></div>
      <div class="q-answer" id="qAnswer">✅ 正確答案：</div>
    </div>
    <div class="groups-grid" id="groupsGrid"></div>
    <div class="next-q-bar">
      <button class="pixel-btn btn-blue btn-sm" id="btnReveal" onclick="revealAnswer()">👁 揭示答案</button>
      <button class="pixel-btn btn-yellow btn-block" id="btnNext" onclick="nextQ()" disabled>▶ 下一題</button>
    </div>
  </div>

  <!-- ── RESULT ── -->
  <div class="screen" id="scrResult">
    <div class="result-layout">
      <div class="result-summary" id="resultSummary"></div>
      <div class="lb-panel"><div class="lb-title">🏆 小組排行榜</div><table class="lb-table"><thead><tr><th>#</th><th>組別</th><th>分數</th></tr></thead><tbody id="lbBody"></tbody></table></div>
    </div>
    <div style="display:flex;gap:10px;margin-top:10px;justify-content:center;">
      <button class="pixel-btn btn-pink btn-block" onclick="goScreen('scrDash')">🔄 開新遊戲</button>
    </div>
  </div>

  <!-- ── ADMIN ── -->
  <div class="screen" id="scrAdmin">
    <h2 style="text-align:center;color:var(--purple-dark);margin-bottom:12px;">📊 管理積分排行榜</h2>
    <div style="overflow-y:auto;flex:1;"><table class="admin-lb-table"><thead><tr><th>#</th><th>年級</th><th>組別/班別</th><th>學號/組</th><th>分數</th><th>操作</th></tr></thead><tbody id="adminBody"></tbody></table></div>
    <div style="display:flex;gap:10px;margin-top:10px;">
      <button class="pixel-btn btn-danger btn-block btn-sm" onclick="clearAll()">🗑 清除全部</button>
      <button class="pixel-btn btn-purple btn-block btn-sm" onclick="goScreen('scrDash')">← 返回</button>
    </div>
  </div>
</div>

<script>
const API='https://chinesepoetry-api.chinesepoetry-api.workers.dev';
let token='lyt:lyt',ses={code:'',grade:''};

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('userLabel').textContent='👩‍🏫 教師';
});

function goScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='scrAdmin')renderAdmin();
}

function doLogin(){}

function logout(){token='lyt:lyt';ses={code:'',grade:''};goScreen('scrDash');}

async function createSes(){
  const grade=document.getElementById('sesGrade').value;
  const btn=document.getElementById('btnCreate');
  btn.disabled=true;btn.textContent='建立中...';
  console.log('createSes grade:',grade,'token:',token);
  try{
    const url=API+'/api/session/create';
    const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+token},body:JSON.stringify({grade})});
    const d=await r.json();
    console.log('createSes response:',d);
    if(d.success){
      ses={code:d.code,grade:d.grade};
      document.getElementById('sesInfo').style.display='block';
      document.getElementById('sesCodeDisp').textContent=d.code;
      document.getElementById('sesGradeDisp').textContent=grade==='P4'?'四年級':grade==='P5'?'五年級':'六年級';
      document.getElementById('btnStart').disabled=false;
    }else{alert('伺服器回應: '+(d.error||'不明'));}
  }catch(e){console.error(e);alert('無法連接: '+e.message+'\n請開 F12 Console 睇');}
  btn.disabled=false;btn.textContent='建立課堂遊戲';
}

async function startGame(){
  const btn=document.getElementById('btnStart');btn.disabled=true;btn.textContent='開始中...';
  try{
    await fetch(API+'/api/session/'+ses.code+'/start',{method:'POST',headers:{Authorization:'Bearer '+token}});
    goScreen('scrQuiz');renderQuiz(null);
  }catch(e){alert('錯誤: '+e.message);}
  btn.disabled=false;btn.textContent='▶ 開始遊戲';
}

async function renderQuiz(groupsOverride){
  try{
    const r=await fetch(API+'/api/session/'+ses.code);
    const d=await r.json();
    if(!d.success)return;
    if(d.state==='finished'){showFinal(d);return;}

    const qi=d.currentQ+1;
    document.getElementById('qCounter').textContent='第 '+qi+' / '+d.totalQ+' 題';
    document.getElementById('qBar').style.width=(d.currentQ/d.totalQ*100)+'%';
    const gs=groupsOverride||d.groups;
    const sum=Object.values(gs).reduce((a,b)=>a+b,0);
    document.getElementById('sumScore').textContent=sum;

    if(d.question){
      document.getElementById('qPoem').textContent='📖 '+d.question.poem;
      document.getElementById('qText').textContent=d.question.text;
      document.getElementById('qAnswer').textContent='✅ 正確答案：'+String.fromCharCode(65+d.question.answer)+'. '+d.question.options[d.question.answer];
      document.getElementById('qAnswer').style.display='none';
    }

    document.getElementById('btnNext').disabled=true;
    document.getElementById('btnReveal').disabled=false;

    const grid=document.getElementById('groupsGrid');
    grid.innerHTML=['A','B','C','D'].map(g=>`
      <div class="group-card ${g}">
        <div class="group-letter">${g}組</div>
        <div class="group-score-box">
          <div class="group-score" id="grpScore_${g}">${gs[g]||0}</div>
          <div class="group-score-label">當前得分</div>
        </div>
        <div class="group-btns">
          <button class="group-btn correct" onclick="scoreGroup('${g}','correct',this)">✅ 答對</button>
          <button class="group-btn wrong" onclick="scoreGroup('${g}','wrong',this)">❌ 答錯</button>
        </div>
      </div>
    `).join('');
  }catch(e){}
}

// ===== SOUND EFFECTS (Web Audio API) =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function getAudioCtx(){ if(!audioCtx) audioCtx = new AudioCtx(); return audioCtx; }

function playSound(type){
  try{
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    const now = ctx.currentTime;
    gain.gain.setValueAtTime(0.3, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + (type==='correct'?0.8:0.5));

    if(type === 'correct'){
      // 🎉 Rising cheerful arpeggio: C5 → E5 → G5 → C6
      osc.type = 'triangle';
      const notes = [523.25, 659.25, 783.99, 1046.5];
      notes.forEach((freq, i) => {
        osc.frequency.setValueAtTime(freq, now + i * 0.15);
      });
      osc.start(now); osc.stop(now + 1.0);
    } else {
      // ❌ Descending buzzer: G3 → D3 (low descending)
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(247.00, now);
      osc.frequency.exponentialRampToValueAtTime(98.00, now + 0.4);
      osc.start(now); osc.stop(now + 0.5);
    }
  }catch(e){}
}

async function scoreGroup(group,type,btn){
  if(btn)btn.classList.add('flash');
  // play sound based on type
  playSound(type === 'correct' ? 'correct' : 'wrong');
  try{
    const r=await fetch(API+'/api/session/'+ses.code+'/score',{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+token},body:JSON.stringify({group,type})});
    const d=await r.json();
    if(d.success){
      document.getElementById('grpScore_'+group).textContent=d.groups[group];
      document.getElementById('sumScore').textContent=Object.values(d.groups).reduce((a,b)=>a+b,0);
      document.getElementById('btnNext').disabled=false;
    }
  }catch(e){}
}

function revealAnswer(){document.getElementById('qAnswer').style.display='block';document.getElementById('btnReveal').disabled=true;}

async function nextQ(){
  const btn=document.getElementById('btnNext');btn.disabled=true;btn.textContent='載入中...';
  try{
    const r=await fetch(API+'/api/session/'+ses.code+'/next',{method:'POST',headers:{Authorization:'Bearer '+token}});
    const d=await r.json();
    if(d.success){
      if(d.state==='finished'){
        const r2=await fetch(API+'/api/session/'+ses.code);showFinal(await r2.json());
      }else{await renderQuiz();}
    }
  }catch(e){}
  btn.disabled=false;btn.textContent='▶ 下一題';
}

function showFinal(d){
  goScreen('scrResult');
  const gs=d.groups;const arr=Object.entries(gs).sort((a,b)=>b[1]-a[1]);
  const winner=arr[0];
  document.getElementById('resultSummary').innerHTML=`
    <div class="trophy">🏆</div>
    <div class="winner">第${winner[0]}組 冠軍！</div>
    <div class="winner-score">${winner[1]} 分</div>
    <p style="font-size:14px;color:var(--text);margin-top:8px;">年級：${d.grade==='P4'?'四年級':d.grade==='P5'?'五年級':'六年級'}</p>
  `;
  document.getElementById('lbBody').innerHTML=arr.map(([g,s],i)=>`
    <tr class="${i===0?'highlight-row':''}">
      <td class="${i<3?'r-'+(i+1):''}">${i<3?['🥇','🥈','🥉'][i]:i+1}</td>
      <td>第${g}組</td><td>${s} 分</td>
    </tr>
  `).join('');
}

async function renderAdmin(){
  try{
    const r=await fetch(API+'/api/leaderboard');const d=await r.json();const lb=d.leaderboard||[];
    const gMap={P4:'四年級',P5:'五年級',P6:'六年級'};
    const tbody=document.getElementById('adminBody');
    if(lb.length===0){tbody.innerHTML='<tr><td colspan="6" style="padding:20px;color:var(--text-light);">未有紀錄</td></tr>';return;}
    tbody.innerHTML=lb.map((e,i)=>`<tr>
      <td>${i<3?['🥇','🥈','🥉'][i]:i+1}</td><td>${gMap[e.grade]||e.grade}</td><td>${e.className}</td><td>${e.studentNo||'—'}</td><td>${e.score}</td>
      <td><button class="pixel-btn btn-danger btn-sm" onclick="delEntry(${i})" style="padding:4px 8px;font-size:11px;">刪除</button></td>
    </tr>`).join('');
  }catch(e){}
}
async function delEntry(i){
  if(!confirm('確定刪除？'))return;
  await fetch(API+'/api/admin/leaderboard',{method:'DELETE',headers:{'Content-Type':'application/json',Authorization:'Bearer '+token},body:JSON.stringify({index:i})});
  renderAdmin();
}
async function clearAll(){
  if(!confirm('⚠️ 確定清除全部排行榜紀錄？無法還原！'))return;
  await fetch(API+'/api/admin/leaderboard',{method:'DELETE',headers:{'Content-Type':'application/json',Authorization:'Bearer '+token},body:JSON.stringify({})});
  renderAdmin();alert('已清除。');
}
</script>
</body>
</html>
